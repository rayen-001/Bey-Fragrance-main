
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
      <title>Hama Fragrance | Luxury Perfumes</title>
      <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%230a0a0a'/><text y='72' x='50' text-anchor='middle' font-size='62'>🧴</text></svg>" />
      <script>
        (function() {
          function protectTranslations() {
            var elements = document.querySelectorAll('.product-title, .product-subtitle');
            for (var i = 0; i < elements.length; i++) {
              elements[i].setAttribute('translate', 'no');
              if (!elements[i].classList.contains('notranslate')) {
                elements[i].classList.add('notranslate');
              }
            }
          }
          document.addEventListener('DOMContentLoaded', function() {
            protectTranslations();
            var observer = new MutationObserver(function(mutations) {
              var shouldProtect = false;
              for (var i = 0; i < mutations.length; i++) {
                if (mutations[i].addedNodes.length > 0) {
                  shouldProtect = true;
                  break;
                }
              }
              if (shouldProtect) protectTranslations();
            });
            observer.observe(document.body, { childList: true, subtree: true });
          });
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
